{% extends "layout.html" %}

{% block content %}

<div class="card card-custom">

    <h3 class="text-center mb-4">Cadastro de Usuário</h3>
    <p class="text-center text-muted">Etapa 1 de 2 - Dados Pessoais</p>

    <form method="POST" action="/biometria" onsubmit="return validarFormulario()">

        <!-- NOME -->
        <div class="mb-3">
            <label>Nome</label>
            <input type="text" name="nome" class="form-control" required>
        </div>

        <!-- CPF -->
        <div class="mb-3">
            <label>CPF</label>
            <input type="text" name="cpf" id="cpf" class="form-control" placeholder="000.000.000-00" required>
        </div>

        <!-- CEP -->
        <div class="mb-3">
            <label>CEP</label>
            <input type="text" name="cep" id="cep" class="form-control" placeholder="00000-000" required>
        </div>

        <!-- RUA -->
        <div class="mb-3">
            <label>Rua</label>
            <input type="text" name="rua" id="rua" class="form-control">
        </div>

        <!-- NUMERO -->
        <div class="mb-3">
            <label>Número</label>
            <input type="text" name="numero" class="form-control" required>
        </div>

        <!-- BAIRRO -->
        <div class="mb-3">
            <label>Bairro</label>
            <input type="text" name="bairro" id="bairro" class="form-control">
        </div>

        <!-- CIDADE -->
        <div class="mb-3">
            <label>Cidade</label>
            <input type="text" name="cidade" id="cidade" class="form-control">
        </div>

        <!-- ESTADO -->
        <div class="mb-3">
            <label>Estado</label>
            <input type="text" name="estado" id="estado" class="form-control">
        </div>

        <!-- ANO -->
        <div class="mb-3">
            <label>Ano de Nascimento</label>
            <input type="number" name="ano" id="ano" class="form-control" placeholder="Ex: 1990" required>
        </div>

        <!-- BOTÃO -->
        <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-lg">
                Próxima Etapa → Biometria
            </button>
        </div>

    </form>

</div>

{% endblock %}
